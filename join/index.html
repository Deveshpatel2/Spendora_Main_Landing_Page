<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Join a group on Spendora</title>
  <meta name="description" content="You've been invited to a shared-expenses group on Spendora." />
  <meta property="og:title" content="Join my group on Spendora" />
  <meta property="og:description" content="Split and track shared expenses together on Spendora." />
  <meta property="og:type" content="website" />
  <style>
    :root { --blue: #3B82F6; --blue-dark: #2563EB; --ink: #0B1020; --muted: #6B7280; }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(160deg, #EFF6FF 0%, #ffffff 55%);
      color: var(--ink);
      display: flex; align-items: center; justify-content: center;
      padding: 24px; min-height: 100%;
    }
    .card {
      width: 100%; max-width: 420px; background: #fff; border-radius: 24px;
      box-shadow: 0 18px 50px rgba(37, 99, 235, 0.16); padding: 36px 28px; text-align: center;
    }
    .logo {
      width: 72px; height: 72px; border-radius: 20px; margin: 0 auto 20px;
      background: var(--blue); display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 34px; font-weight: 800;
    }
    h1 { font-size: 22px; margin: 0 0 8px; }
    p { color: var(--muted); font-size: 15px; line-height: 1.5; margin: 0 0 24px; }
    .btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; height: 54px; border-radius: 14px; border: 0; cursor: pointer;
      font-size: 16px; font-weight: 700; text-decoration: none; margin-bottom: 12px;
    }
    .btn-primary { background: var(--blue); color: #fff; }
    .btn-primary:active { background: var(--blue-dark); }
    .stores { display: flex; gap: 12px; margin-top: 8px; }
    .store {
      flex: 1; height: 50px; border-radius: 12px; border: 1px solid #E5E7EB; background: #fff;
      color: var(--ink); font-weight: 600; font-size: 14px; text-decoration: none;
      display: flex; align-items: center; justify-content: center;
    }
    .hint { font-size: 13px; color: var(--muted); margin-top: 18px; }
  </style>
</head>
<body>
  <main class="card">
    <div class="logo">S</div>
    <h1>You're invited to a group</h1>
    <p>Open this invite in the Spendora app to join and start splitting expenses together.</p>

    <a id="openApp" class="btn btn-primary" href="#">Open in Spendora</a>

    <div class="stores">
      <a class="store" id="appStore" href="https://apps.apple.com/us/app/spendora-expense-tracker/id6769786164">App Store</a>
    </div>

    <p class="hint">Don't have the app yet? Install it, then tap the invite link again.</p>
  </main>

  <script>
    // The path is /join/<token>. If the app is installed and the domain is verified, the OS opens
    // the app directly and this page is never shown. This page is the fallback (app not installed,
    // or verification not yet propagated) and also offers a manual custom-scheme open.
    (function () {
      var parts = window.location.pathname.split('/').filter(Boolean); // ["join", "<token>"]
      var token = parts.length > 1 ? parts[1] : new URLSearchParams(window.location.search).get('token');

      var openApp = document.getElementById('openApp');
      if (token) {
        openApp.setAttribute('href', 'com.spendora.mobile://join/' + encodeURIComponent(token));
      } else {
        openApp.style.display = 'none';
      }
    })();
  </script>
</body>
</html>
